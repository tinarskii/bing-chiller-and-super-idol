<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prepare for Bing Chilling and other's Meme</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Noto+Sans');
        .main {
            width: 100vw;
            height: 100vh;
            display: grid;
            place-items: center;
        }
        .main h1 {
            text-align: center;
            font-family: Noto Sans;
        }
        ::-webkit-scrollbar {
            width: 0;
        }
    </style>
</head>
<body>
    <div class="main">
            <h1>Are you ready for Bing Chilling?<br> 
            Don't Worry, It will immediately stop after 5 seconds</h1>
    </div>
</body>
<script>
    // This will only open 10 tabs
    setTimeout(function(){
        window.close()
    }, 7000);
    setInterval(() => {
        window.open(["https://www.youtube.com/watch?v=KH_XIt-hm2Y", "https://www.youtube.com/watch?v=aCgP8BFjrw4", "https://www.youtube.com/watch?v=dQw4w9WgXcQ"][Math.floor(Math.random() * 3)], "_blank");
    }, 700);
</script>
</html>
